# Optional: GitHub Pages for the Vite app (Settings → Pages → Source: GitHub Actions).
# Add repository secret VITE_API_BASE = your deployed API origin, e.g. https://asklytics-api.onrender.com
name: Deploy web to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/deploy-web-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install and build
        working-directory: web
        env:
          VITE_API_BASE: ${{ secrets.VITE_API_BASE }}
          # Must match the GitHub Pages project path (repo name), e.g. /Asklytics/ for …/Asklytics/
          VITE_BASE_PATH: ${{ vars.PAGES_BASE_PATH || '/Asklytics/' }}
        run: npm ci && npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
