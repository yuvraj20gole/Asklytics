# Render Blueprint: API + static web (https://render.com/docs/infrastructure-as-code)
# 1) Push this file to GitHub → Render Dashboard → New → Blueprint → connect repo.
# 2) After deploy: copy the API URL (e.g. https://asklytics-api.onrender.com).
# 3) In the static service, set env VITE_API_BASE to that URL (no trailing slash) → Manual Deploy.
# 4) In the API service, set CORS_ALLOW_ORIGINS to your web URL (e.g. https://asklytics-web.onrender.com).
#
# API: you MUST use the Docker runtime below (Python 3.12). Do not use “Python 3” native runtime — Render defaults to 3.14,
# and torch==2.2.2 has no wheel for 3.14 (pip fails). If you refuse Docker, use Native Python with:
#   Environment → PYTHON_VERSION = 3.12.8
#   Root Directory = backend
#   Build = pip install -r requirements.txt && … (same start command as Dockerfile CMD)

services:
  - type: web
    name: asklytics-api
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /docs
    envVars:
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:///./local.db
      - key: CORS_ALLOW_ORIGINS
        sync: false

  # Static sites: omit `plan` — `free` is not valid for runtime: static (see Render blueprint spec).
  - type: web
    name: asklytics-web
    runtime: static
    rootDir: web
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE
        sync: false
