version: "3.9"
services:
  backend:
    build:
      context: ..
      dockerfile: infra/docker/backend.Dockerfile
    env_file:
      - ../.env
    ports:
      - "8000:8000"
  frontend:
    build:
      context: ..
      dockerfile: infra/docker/frontend.Dockerfile
    environment:
      - BACKEND_URL=http://backend:8000
    ports:
      - "8501:8501"
    depends_on:
      - backend
